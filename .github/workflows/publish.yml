name: Build & Publish to PyPI

on:
  push:
    tags:
      - "v*"       # Trigger on version tags: v0.5.0, v0.5.1, etc.
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  # ============================================================
  # Build wheels for Linux, macOS, Windows
  # ============================================================
  build:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux aarch64 (ARM)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # macOS x86_64 (Intel)
          - os: macos-13
            target: x86_64-apple-darwin
          # macOS arm64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # ============================================================
  # Build source distribution
  # ============================================================
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ============================================================
  # Publish to PyPI
  # ============================================================
  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/codegraphcontext-rust
    permissions:
      id-token: write  # Trusted publishing (no API token needed)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ============================================================
  # Test: verify wheel installs and works
  # ============================================================
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python }})
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install wheel
        run: |
          pip install --find-links dist codegraphcontext-rust
          pip install kuzu

      - name: Test import and parse
        run: |
          python -c "
          from codegraphcontext._cgc_rust import parse_file, parse_files_parallel, pre_scan_for_imports
          from codegraphcontext.tools.indexing.engine import RUST_AVAILABLE, _RUST_SUPPORTED_LANGS
          assert RUST_AVAILABLE, 'Rust engine not available'
          assert len(_RUST_SUPPORTED_LANGS) == 19, f'Expected 19 langs, got {len(_RUST_SUPPORTED_LANGS)}'

          # Quick parse test
          import tempfile, os
          with tempfile.NamedTemporaryFile(mode='w', suffix='.py', delete=False) as f:
              f.write('def hello():\n    print(\"hi\")\n')
              tmp = f.name
          r = parse_file(tmp, 'python', False, False)
          os.unlink(tmp)
          assert 'error' not in r
          assert len(r['functions']) == 1
          assert r['functions'][0]['name'] == 'hello'
          print(f'All tests passed: {len(_RUST_SUPPORTED_LANGS)} languages, Rust engine OK')
          "

      - name: Run Rust unit tests
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          cd rust && cargo test -p cgc-core
